```html
<!DOCTYPE html>
<html>
<head>
<title>Snake & Ladders Game</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#2b2e4a;
color:white;
}

h1{
margin-top:20px;
}

#board{
width:500px;
height:500px;
margin:auto;
display:grid;
grid-template-columns:repeat(10,50px);
grid-template-rows:repeat(10,50px);
border:3px solid white;
}

.cell{
border:1px solid #444;
background:white;
color:black;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
}

.token{
width:20px;
height:20px;
border-radius:50%;
}

.red{background:red;}
.blue{background:blue;}

button{
margin-top:20px;
padding:10px 25px;
font-size:18px;
cursor:pointer;
}

#dice{
font-size:30px;
margin:10px;
}

</style>

</head>

<body>

<h1>🐍 Snake & Ladders</h1>

<div id="board"></div>

<h2 id="turn">Player 1 Turn</h2>

<div id="dice">🎲</div>

<button onclick="rollDice()">Roll Dice</button>

<script>

const board=document.getElementById("board")

for(let i=100;i>=1;i--){

let cell=document.createElement("div")
cell.classList.add("cell")
cell.id="cell"+i
cell.innerText=i

board.appendChild(cell)

}

let player1=1
let player2=1
let turn=1

const snakes={
99:54,
70:55,
52:42,
25:2,
95:72
}

const ladders={
6:25,
11:40,
17:69,
46:90,
60:85
}

function renderPlayers(){

document.querySelectorAll(".token").forEach(t=>t.remove())

let p1=document.createElement("div")
p1.classList.add("token","red")

let p2=document.createElement("div")
p2.classList.add("token","blue")

document.getElementById("cell"+player1).appendChild(p1)
document.getElementById("cell"+player2).appendChild(p2)

}

renderPlayers()

function rollDice(){

let dice=Math.floor(Math.random()*6)+1
document.getElementById("dice").innerText="🎲 "+dice

if(turn===1){

player1+=dice

if(snakes[player1]) player1=snakes[player1]
if(ladders[player1]) player1=ladders[player1]

if(player1>=100){
alert("Player 1 Wins!")
location.reload()
}

turn=2
document.getElementById("turn").innerText="Player 2 Turn"

}

else{

player2+=dice

if(snakes[player2]) player2=snakes[player2]
if(ladders[player2]) player2=ladders[player2]

if(player2>=100){
alert("Player 2 Wins!")
location.reload()
}

turn=1
document.getElementById("turn").innerText="Player 1 Turn"

}

renderPlayers()

}

</script>

</body>
</html>
